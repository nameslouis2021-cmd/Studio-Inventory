// ── CSV EXPORT ────────────────────────────────────────────────────────────────
function exportCSV(rows, filename) {
  if (!rows.length) return;
  const keys = Object.keys(rows[0]);
  const csv = [
    keys.join(','),
    ...rows.map(r => keys.map(k => {
      const v = r[k] == null ? '' : String(r[k]);
      return v.includes(',') || v.includes('"') || v.includes('\n')
        ? '"' + v.replace(/"/g, '""') + '"'
        : v;
    }).join(','))
  ].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function getBalance(txs, itemId) {
  return txs.filter(t=>t.itemId===itemId).reduce((a,t)=>t.type==='out'?a+t.qty:a-t.qty,0);
}
function timeAgo(iso) {
  const s=(Date.now()-new Date(iso))/1000;
  if(s<60) return 'Just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function fmtDT(iso) {
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+
    ' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

// ── PIN MODAL ─────────────────────────────────────────────────────────────
const PinModal = ({correctPin, onSuccess, onCancel}) => {
  const [entered, setEntered] = useState('');
  const [error, setError]     = useState(false);
  const [shake, setShake]     = useState(false);

  const press = (d) => {
    if(entered.length >= 4) return;
    const next = entered + d;
    setEntered(next);
    setError(false);
    if(next.length === 4) {
      setTimeout(()=>{
        if(next === correctPin) { onSuccess(); }
        else {
          setShake(true);
          setError(true);
          setTimeout(()=>{ setEntered(''); setShake(false); }, 600);
        }
      }, 150);
    }
  };

  const del = () => { setEntered(e=>e.slice(0,-1)); setError(false); };

  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.55)',
      backdropFilter:'blur(6px)', display:'flex', alignItems:'center',
      justifyContent:'center', zIndex:500,

        background:C.surface, borderRadius:14, padding:'36px 32px',

        animation: shake ? 'shake 0.4s ease' : 'none',

        <style>{`
          @keyframes shake {
            0%,100%{transform:translateX(0)}
            20%{transform:translateX(-8px)}
            40%{transform:translateX(8px)}
            60%{transform:translateX(-6px)}
            80%{transform:translateX(6px)}

        `}</style>

          <div style={{fontSize:12, color:C.textMuted, marginTop:4}}>Enter your PIN to continue</div>
        </div>

        {/* Dots */}
        <div style={{display:'flex', justifyContent:'center', gap:14, marginBottom:28}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{
              width:14, height:14, borderRadius:'50%',
              background: entered.length > i ? (error?C.red:'#1c2537') : C.border,
              transition:'background 0.15s',
            }}/>
          ))}
        </div>

        {/* Keypad */}
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10}}>
          {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((d,i)=>(
            <button key={i} onClick={()=>{ if(d==='⌫') del(); else if(d!=='') press(String(d)); }}
              disabled={d===''} style={{
                height:52, borderRadius:8, border:`1px solid ${C.border}`,
                background: d==='' ? 'transparent' : C.bg,
                cursor: d==='' ? 'default' : 'pointer',
                fontSize: d==='⌫' ? 18 : 20, fontWeight:600, color:C.text,
                transition:'background 0.1s',
              }}
              onMouseEnter={e=>{ if(d!=='') e.target.style.background='#e4e8f0'; }}
              onMouseLeave={e=>{ if(d!=='') e.target.style.background=C.bg; }}
            >{d}</button>
          ))}
        </div>

          <div style={{textAlign:'center', color:C.red, fontSize:12, marginTop:14, fontWeight:500}}>
            Incorrect PIN. Try again.

      background:C.surface, border:`1px solid ${C.border}`, borderRadius:12,
      padding:28, width, maxWidth:'95vw', maxHeight:'92vh', overflowY:'auto',

// ── CHECK IN/OUT MODAL ────────────────────────────────────────────────────
const CheckModal = ({type, items, transactions, people=[], catsMap, onConfirm, onClose, prefill=''}) => {
  const CATMAP = catsMap || CATS;
  const [itemId, setItemId] = useState('');
  const [person, setPerson] = useState(prefill);
  const [email, setEmail]   = useState('');
  const [qty, setQty]       = useState(1);
  const [notes, setNotes]   = useState('');

  // Auto-fill email when name matches a saved person
  useEffect(() => {
    const match = people.find(p => p.name.trim().toLowerCase() === person.trim().toLowerCase());
    if (match && match.email && email !== match.email) setEmail(match.email);
  }, [person, people]);
  const [done, setDone]     = useState(false);
  const [scanMode, setScan] = useState(false);
  const [scanVal, setScanVal]= useState('');
  const scanRef = useRef();

  useEffect(()=>{ if(scanMode && scanRef.current) scanRef.current.focus(); },[scanMode]);

  const eligible = items.filter(item=>{
    const bal=getBalance(transactions,item.id);
    return type==='out' ? (item.qty-bal)>0 : bal>0;
  });
  const sel = items.find(i=>i.id===itemId);
  const maxQ = sel ? (type==='out'
    ? sel.qty-getBalance(transactions,sel.id)
    : getBalance(transactions,sel.id)) : 1;

  const handleScan = e=>{
    if(e.key==='Enter'&&scanVal.trim()){
      const m=items.find(i=>i.id.toLowerCase()===scanVal.trim().toLowerCase());
      if(m){setItemId(m.id);setScan(false);setScanVal('');}
      else setScanVal('');
    }
  };

  const valid = itemId && person.trim() && qty>=1 && qty<=maxQ;

  const confirm = ()=>{
    if(!valid) return;
    setDone(true);
    setTimeout(()=>onConfirm({itemId,person:person.trim(),email:email.trim(),qty,notes,type}),500);
  };

  const isOut = type==='out';
  const accentColor = isOut ? C.red : C.green;
  const accentBg    = isOut ? C.redBg : C.greenBg;

  const fieldLabel = { fontSize:11, fontWeight:600, color:C.textSub, letterSpacing:'0.04em',
    display:'block', marginBottom:6, textTransform:'uppercase' };

  const inp = { width:'100%', background:C.bg, border:`1px solid ${C.border}`, borderRadius:7,
    padding:'9px 12px', color:C.text, fontSize:13, transition:'border-color 0.15s' };

  return (
    <Modal onClose={onClose}>
      {done ? (
        <div style={{textAlign:'center', padding:'24px 0'}}>
          <div style={{width:52,height:52,borderRadius:'50%',background:accentBg,
            display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
            <Ic n="check" s={24} c={accentColor}/>
          </div>
          <div style={{fontSize:16,fontWeight:700,color:C.text}}>
            {isOut?'Checked out':'Returned'} successfully
          </div>
        </div>
      ) : (
      <>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22}}>
          <div>
            <div style={{
              display:'inline-flex', alignItems:'center', gap:6,
              padding:'3px 10px', borderRadius:20,
              background:accentBg, color:accentColor,
              fontSize:11, fontWeight:700, letterSpacing:'0.06em', marginBottom:8,
              border:`1px solid ${isOut?C.redBorder:C.greenBorder}`,
            }}>
              <Ic n={isOut?'out':'ret'} s={12} c={accentColor}/>
              {isOut?'CHECK OUT':'RETURN'}
            </div>
            <h2 style={{fontSize:18,fontWeight:700,color:C.text}}>
              {isOut?'Issue Equipment':'Return Equipment'}
            </h2>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:C.textMuted,padding:4}}>
            <Ic n="close" s={16}/>
          </button>
        </div>

        <div style={{marginBottom:16}}>
          <label style={fieldLabel}>Item</label>
          <div style={{display:'flex',gap:8}}>
            <select value={itemId} onChange={e=>setItemId(e.target.value)} style={{...inp,flex:1}}>
              <option value="">Select equipment…</option>
              {eligible.map(i=>(
                <option key={i.id} value={i.id}>{i.name}{i.id?` (${i.id})`:''}</option>
              ))}
            </select>
            <button onClick={()=>setScan(!scanMode)} title="Scan asset ID" style={{
              padding:'9px 11px', borderRadius:7, cursor:'pointer',
              border:`1px solid ${scanMode?'var(--accent)':C.border}`,
              background:scanMode?'var(--accent-light)':C.bg,
              color:scanMode?'var(--accent)':C.textMuted,
            }}>
              <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 9V5a2 2 0 012-2h4M15 3h4a2 2 0 012 2v4M3 15v4a2 2 0 002 2h4M15 21h4a2 2 0 002-2v-4M8 12h8"/>
              </svg>
            </button>
          </div>
          {scanMode && (
            <input ref={scanRef} value={scanVal} onChange={e=>setScanVal(e.target.value)}
              onKeyDown={handleScan} placeholder="Type asset ID + Enter (e.g. GH6-01)"
              style={{...inp, marginTop:8, fontFamily:'JetBrains Mono', fontSize:12, borderColor:'var(--accent)'}}/>
          )}
          {sel && (
            <div style={{marginTop:6,fontSize:11,color:C.textMuted,display:'flex',gap:12}}>
              <span>Available: <strong style={{color:C.green}}>{maxQ}</strong></span>
              <span style={{color:(CATMAP[sel.category]||{color:'#666'}).color}}>{(CATMAP[sel.category]||{label:sel.category}).label}</span>
            </div>
          )}
          {sel && sel.notes && (
            <div style={{
              marginTop:10, padding:'10px 12px', background:'var(--accent-light)',
              border:'1px solid var(--accent)', borderRadius:7,
              fontSize:12, color:C.text, lineHeight:1.5,
            }}>
              <div style={{fontSize:10, fontWeight:700, letterSpacing:'0.06em', color:'var(--accent)', marginBottom:3, textTransform:'uppercase'}}>Item Notes</div>
              {sel.notes}
            </div>
          )}
        </div>

        <div style={{marginBottom:16}}>
          <label style={fieldLabel}>{isOut?'Checked out by':'Returned by'}</label>
          <input value={person} onChange={e=>setPerson(e.target.value)}
            placeholder="Full name" style={inp} list="people-names"
            onFocus={e=>e.target.style.borderColor='var(--accent)'}
            onBlur={e=>e.target.style.borderColor=C.border}/>
          <datalist id="people-names">
            {people.map(p => <option key={p.id} value={p.name}/>)}
          </datalist>
        </div>

        <div style={{marginBottom:16}}>
          <label style={fieldLabel}>Email {isOut && <span style={{textTransform:'none',fontWeight:400,color:C.textMuted}}>(optional)</span>}</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
            placeholder="name@example.com" style={inp}
            onFocus={e=>e.target.style.borderColor='var(--accent)'}
            onBlur={e=>e.target.style.borderColor=C.border}/>
          {email && people.find(p=>p.name.trim().toLowerCase()===person.trim().toLowerCase()&&p.email===email) && (
            <div style={{marginTop:4,fontSize:10,color:C.green}}>✓ Matched saved contact</div>
          )}
        </div>

        <div style={{marginBottom:16}}>
          <label style={fieldLabel}>Quantity</label>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{
              width:34,height:34,borderRadius:7,border:`1px solid ${C.border}`,
              background:C.bg,cursor:'pointer',color:C.text,fontSize:16,
              display:'flex',alignItems:'center',justifyContent:'center',
            }}>−</button>
            <span style={{fontSize:20,fontWeight:700,minWidth:28,textAlign:'center',fontFamily:'JetBrains Mono'}}>{qty}</span>
            <button onClick={()=>setQty(q=>Math.min(maxQ,q+1))} style={{
              width:34,height:34,borderRadius:7,border:`1px solid ${C.border}`,
              background:C.bg,cursor:'pointer',color:C.text,fontSize:16,
              display:'flex',alignItems:'center',justifyContent:'center',
            }}>+</button>
            <span style={{fontSize:11,color:C.textMuted}}>of {maxQ} available</span>
          </div>
        </div>

        <div style={{marginBottom:24}}>
          <label style={fieldLabel}>Notes <span style={{textTransform:'none',fontWeight:400,color:C.textMuted}}>(optional)</span></label>
          <input value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="Location, shoot, etc." style={inp}
            onFocus={e=>e.target.style.borderColor='var(--accent)'}
            onBlur={e=>e.target.style.borderColor=C.border}/>
        </div>

        <button onClick={confirm} disabled={!valid} style={{
          width:'100%', padding:'11px', borderRadius:8, border:'none',
          background: valid ? (isOut?C.red:C.green) : C.border,
          color: valid ? '#fff' : C.textMuted,
          fontSize:13, fontWeight:700, cursor:valid?'pointer':'not-allowed',
          display:'flex', alignItems:'center', justifyContent:'center', gap:6,
        }}>
          <Ic n={isOut?'out':'ret'} s={14} c={valid?'#fff':C.textMuted}/>
          {isOut?'Confirm Check Out':'Confirm Return'}
        </button>
      </>
      )}
    </Modal>
  );
};

// ── ADD / EDIT ITEM MODAL ─────────────────────────────────────────────────
const AddItemModal = ({onSave, onClose, existing, catsMap}) => {
  const CATMAP = catsMap || CATS;
  const genId = (cat) => {
    const prefixes = {camera:'CAM',lighting:'LIT',audio:'AUD',expendable:'EXP'};
    return (prefixes[cat]||'ITM')+'-'+Date.now().toString(36).toUpperCase().slice(-4);
  };
  const [name,  setName]  = useState(existing?.name||'');
  const [cat,   setCat]   = useState(existing?.category||'camera');
  const [qty,   setQty]   = useState(existing?.qty||1);
  const [notes, setNotes] = useState(existing?.notes||'');
  const [id,    setId]    = useState(existing?.id||'');
  const isEdit = !!existing;

  useEffect(()=>{ if(!isEdit && !id) setId(genId(cat)); },[cat]);

  const valid = name.trim() && id.trim() && qty >= 1;

  const inp = {
    width:'100%', background:C.bg, border:`1px solid ${C.border}`,
    borderRadius:7, padding:'9px 12px', color:C.text, fontSize:13,
  };
  const lbl = {
    fontSize:11, fontWeight:600, color:C.textSub, letterSpacing:'0.04em',
    display:'block', marginBottom:6, textTransform:'uppercase',
  };

  return (
    <Modal onClose={onClose} width={460}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:22}}>
        <div>
          <div style={{
            display:'inline-flex',alignItems:'center',gap:6,padding:'3px 10px',borderRadius:20,
            background:C.blueBg,color:C.blue,fontSize:11,fontWeight:700,letterSpacing:'0.06em',
            marginBottom:8,border:`1px solid ${C.blue}30`,
          }}>
            <Ic n={isEdit?'edit':'plus'} s={11} c={C.blue}/>
            {isEdit?'EDIT ITEM':'ADD ITEM'}
          </div>
          <h2 style={{fontSize:18,fontWeight:700,color:C.text}}>
            {isEdit?'Edit Equipment':'Add Equipment'}
          </h2>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:C.textMuted,padding:4}}>
          <Ic n="close" s={16}/>
        </button>
      </div>

      <div style={{marginBottom:14}}>
        <label style={lbl}>Item Name</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Lumix GH6" style={inp}
          onFocus={e=>e.target.style.borderColor='var(--accent)'}
          onBlur={e=>e.target.style.borderColor=C.border}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
        <div>
          <label style={lbl}>Category</label>
          <select value={cat} onChange={e=>{setCat(e.target.value);if(!isEdit)setId(genId(e.target.value));}} style={inp}>
            {Object.entries(CATMAP).map(([k,v])=>(
              <option key={k} value={k}>{v.label}</option>
            ))}
          </select>
        </div>
        <div>
          <label style={lbl}>Asset ID</label>
          <input value={id} onChange={e=>setId(e.target.value.toUpperCase())} style={{...inp,fontFamily:'JetBrains Mono',fontSize:12}}
            onFocus={e=>e.target.style.borderColor='var(--accent)'}
            onBlur={e=>e.target.style.borderColor=C.border}/>
        </div>
      </div>

      <div style={{marginBottom:14}}>
        <label style={lbl}>Quantity</label>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{
            width:34,height:34,borderRadius:7,border:`1px solid ${C.border}`,
            background:C.bg,cursor:'pointer',color:C.text,fontSize:16,
            display:'flex',alignItems:'center',justifyContent:'center',
          }}>−</button>
          <span style={{fontSize:20,fontWeight:700,minWidth:28,textAlign:'center',fontFamily:'JetBrains Mono'}}>{qty}</span>
          <button onClick={()=>setQty(q=>q+1)} style={{
            width:34,height:34,borderRadius:7,border:`1px solid ${C.border}`,
            background:C.bg,cursor:'pointer',color:C.text,fontSize:16,
            display:'flex',alignItems:'center',justifyContent:'center',
          }}>+</button>
        </div>
      </div>

      <div style={{marginBottom:24}}>
        <label style={lbl}>Notes <span style={{textTransform:'none',fontWeight:400,color:C.textMuted}}>(optional)</span></label>
        <input value={notes} onChange={e=>setNotes(e.target.value)} placeholder="e.g. Body only, includes case" style={inp}
          onFocus={e=>e.target.style.borderColor='var(--accent)'}
          onBlur={e=>e.target.style.borderColor=C.border}/>
      </div>

      <button onClick={()=>valid&&onSave({id:id.trim(),name:name.trim(),category:cat,qty,notes})}
        disabled={!valid} style={{
          width:'100%',padding:'11px',borderRadius:8,border:'none',
          background:valid?C.blue:C.border,
          color:valid?'#fff':C.textMuted,
          fontSize:13,fontWeight:700,cursor:valid?'pointer':'not-allowed',
          display:'flex',alignItems:'center',justifyContent:'center',gap:6,
        }}>
        <Ic n={isEdit?'check':'plus'} s={14} c={valid?'#fff':C.textMuted}/>
        {isEdit?'Save Changes':'Add to Catalog'}
      </button>
    </Modal>
  );
};

// ── CREW VIEW ─────────────────────────────────────────────────────────────
const CrewView = ({items, transactions, openModal, catsMap}) => {
  const [name, setName]   = useState('');
  const [search, setSearch] = useState('');

  const myOut = name.trim() ? (() => {
    const map = {};
    transactions.filter(t=>t.person.toLowerCase()===name.trim().toLowerCase()).forEach(t=>{
      map[t.itemId] = (map[t.itemId]||0) + (t.type==='out'?t.qty:-t.qty);
    });
    return Object.entries(map).filter(([,v])=>v>0);
  })() : [];

  const filtered = items.filter(i=>
    !search || i.name.toLowerCase().includes(search.toLowerCase()) || i.id.toLowerCase().includes(search.toLowerCase())
  );

  const totalUnits = items.reduce((a,i)=>a+i.qty,0);
  const outUnits   = items.reduce((a,i)=>a+Math.max(0,getBalance(transactions,i.id)),0);

  return (
    <div style={{display:'flex', height:'100%', overflow:'hidden'}}>

      {/* Left sidebar */}
      <div style={{
        width:260, flexShrink:0, background:C.sidebar,
        display:'flex', flexDirection:'column',
      }}>
        <div style={{padding:'22px 20px 18px', borderBottom:'1px solid rgba(255,255,255,0.08)'}}>

              style={{width:'100%', maxWidth:160, filter:'brightness(0) invert(1)', opacity:0.9}}/>
          </div>

          <div style={{fontSize:10,color:'rgba(255,255,255,0.45)',letterSpacing:'0.08em',marginBottom:8,fontWeight:600}}>YOUR NAME</div>
          <div style={{position:'relative'}}>
            <Ic n="user" s={13} style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'rgba(255,255,255,0.35)'}}/>

              style={{
                width:'100%', background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)',
                borderRadius:7, padding:'9px 12px 9px 32px', color:'#fff', fontSize:13,
              }}
              onFocus={e=>{e.target.style.borderColor='var(--accent)';e.target.style.background='rgba(255,255,255,0.1)';}}
              onBlur={e=>{e.target.style.borderColor='rgba(255,255,255,0.12)';e.target.style.background='rgba(255,255,255,0.07)';}}
            />
          </div>
        </div>

        {/* Quick actions */}
        <div style={{padding:'14px 14px', borderBottom:'1px solid rgba(255,255,255,0.08)'}}>
          <button onClick={()=>openModal('out',name)} style={{
            width:'100%', display:'flex', alignItems:'center', gap:8,
            padding:'10px 14px', borderRadius:8, border:'none', cursor:'pointer',
            background:'var(--accent)', color:'#fff', fontSize:13, fontWeight:700, marginBottom:8,
          }}>
            <Ic n="out" s={14} c="#fff"/> Check Out Equipment
          </button>
          <button onClick={()=>openModal('in',name)} style={{
            width:'100%', display:'flex', alignItems:'center', gap:8,
            padding:'10px 14px', borderRadius:8, cursor:'pointer', fontSize:13, fontWeight:600,
            border:'1px solid rgba(255,255,255,0.15)', background:'transparent', color:'rgba(255,255,255,0.75)',
          }}>
            <Ic n="ret" s={14} c="rgba(255,255,255,0.75)"/> Return Equipment
          </button>
        </div>

        {/* My items */}
        <div style={{flex:1, overflow:'auto', padding:'12px 0'}}>
          <div style={{padding:'0 20px 8px', fontSize:10, fontWeight:600, color:'rgba(255,255,255,0.35)', letterSpacing:'0.1em'}}>

      <div style={{flex:1, overflow:'auto', padding:24}}>

          <h1 style={{fontSize:18, fontWeight:700, color:C.text}}>Equipment Availability</h1>
          <div style={{position:'relative'}}>
            <Ic n="search" s={14} style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:C.textMuted}}/>

              style={{
                background:C.surface, border:`1px solid ${C.border}`, borderRadius:7,
                padding:'8px 12px 8px 32px', color:C.text, fontSize:12, width:200,
              }}
              onFocus={e=>e.target.style.borderColor='var(--accent)'}
              onBlur={e=>e.target.style.borderColor=C.border}
            />
          </div>
        </div>

        {/* Category groups */}
        {Object.entries(catsMap || CATS).map(([catKey, cat])=>{
          const catItems = filtered.filter(i=>i.category===catKey);
          if(!catItems.length) return null;
          const safeColor = cat?.color || '#666';
          const safeLabel = cat?.label || catKey;
          return (
            <div key={catKey} style={{marginBottom:22}}>
              <div style={{fontSize:11, fontWeight:700, color:safeColor,
                letterSpacing:'0.06em', marginBottom:10, display:'flex', alignItems:'center', gap:8}}>
                <span style={{width:8,height:8,borderRadius:'50%',background:safeColor,display:'inline-block'}}/>
                {safeLabel.toUpperCase()}
              </div>
              <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px,1fr))', gap:10}}>
                {catItems.map(item=>{
                  const bal=getBalance(transactions,item.id);
                  const avail=item.qty-bal;
                  const empty=avail===0;
                  return (
                    <div key={item.id} style={{
                      background:C.surface, border:`1px solid ${empty?C.redBorder:C.border}`,
                      borderRadius:8, padding:'14px 16px',
                      opacity:empty?0.7:1, position:'relative', overflow:'hidden',
                    }}>
                      <div style={{
                        position:'absolute', top:0, left:0, right:0, height:3,
                        background: avail===item.qty ? C.green : avail>0 ? C.amber : C.red,
                      }}/>
                      <div style={{fontSize:13, fontWeight:600, color:C.text, marginBottom:4}}>{item.name}</div>
                      <div style={{fontSize:10, fontFamily:'JetBrains Mono', color:C.textMuted, marginBottom:10}}>{item.id}</div>
                      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <span style={{fontSize:11, color:empty?C.red:C.textSub}}>
                          {empty ? 'All checked out' : `${avail} of ${item.qty} available`}
                        </span>
                        <span style={{
                          fontSize:14, fontWeight:700, fontFamily:'JetBrains Mono',
                          color: empty ? C.red : avail===item.qty ? C.green : C.amber,
                        }}>{avail}/{item.qty}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── MANAGER CATALOG ───────────────────────────────────────────────────────
const MgrCatalog = ({items, transactions, catsMap, openModal, onAddItem, onEditItem, onRemoveItem}) => {

  const [cat, setCat]         = useState('all');

  const [editItem, setEdit]   = useState(null);

    const mc=cat==='all'||i.category===cat;
    return ms&&mc;
  });

  return (
    <div style={{padding:24}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:22}}>
        <h1 style={{fontSize:20, fontWeight:700, color:C.text}}>Equipment Catalog</h1>
        <div style={{display:'flex', gap:8}}>
          <button onClick={()=>openModal('in')} style={{
            display:'flex', alignItems:'center', gap:6, padding:'8px 14px',
            borderRadius:7, border:`1px solid ${C.greenBorder}`, background:C.greenBg,
            color:C.green, fontSize:12, fontWeight:700, cursor:'pointer',
          }}>
            <Ic n="ret" s={13} c={C.green}/> Return
          </button>
          <button onClick={()=>openModal('out')} style={{
            display:'flex', alignItems:'center', gap:6, padding:'8px 14px',
            borderRadius:7, border:'none', background:'var(--accent)',
            color:'#fff', fontSize:12, fontWeight:700, cursor:'pointer',
          }}>
            <Ic n="out" s={13} c="#fff"/> Check Out
          </button>
          <button onClick={()=>setShowAdd(true)} style={{
            display:'flex', alignItems:'center', gap:6, padding:'8px 14px',
            borderRadius:7, border:`1px solid ${C.blue}40`, background:C.blueBg,
            color:C.blue, fontSize:12, fontWeight:700, cursor:'pointer',
          }}>
            <Ic n="plus" s={13} c={C.blue}/> Add Item
          </button>
          <button onClick={()=>{
            const rows = items.map(i=>({
              id: i.id,
              name: i.name,
              category: CATS[i.category]?.label || i.category,
              qty: i.qty,
              checked_out: Math.max(0, getBalance(transactions, i.id)),
              available: i.qty - Math.max(0, getBalance(transactions, i.id)),
              notes: i.notes || '',
            }));
            exportCSV(rows, 'TES_Inventory_'+new Date().toISOString().slice(0,10)+'.csv');
          }} style={{
            display:'flex', alignItems:'center', gap:6, padding:'8px 14px',
            borderRadius:7, border:`1px solid ${C.borderDark}`, background:C.surface,
            color:C.textSub, fontSize:12, fontWeight:700, cursor:'pointer',
          }}>
            <Ic n="list" s={13} c={C.textSub}/> Export CSV
          </button>
        </div>
      </div>

      <div style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, overflow:'hidden'}}>
        {/* Toolbar */}
        <div style={{
          padding:'12px 16px', borderBottom:`1px solid ${C.border}`, background:'#fafbfc',
          display:'flex', gap:8, flexWrap:'wrap', alignItems:'center',
        }}>
          <div style={{position:'relative', flex:'1 1 180px', maxWidth:260}}>
            <Ic n="search" s={13} style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:C.textMuted}}/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search catalog…"
              style={{
                width:'100%', background:C.surface, border:`1px solid ${C.border}`, borderRadius:6,
                padding:'7px 11px 7px 30px', color:C.text, fontSize:12,
              }}
              onFocus={e=>e.target.style.borderColor='var(--accent)'}
              onBlur={e=>e.target.style.borderColor=C.border}
            />
          </div>
          {['all','camera','gimbal','lighting','audio','expendable'].map(c=>(
            <button key={c} onClick={()=>setCat(c)} style={{
              padding:'6px 12px', borderRadius:6, fontSize:11, cursor:'pointer',
              fontWeight:cat===c?700:500,
              border:`1px solid ${cat===c?'var(--accent)':C.border}`,
              background: cat===c?'var(--accent-light)':'transparent',
              color: cat===c?'var(--accent)':C.textSub,
            }}>
              {c==='all'?'All':((catsMap||CATS)[c]||{label:c}).label}
            </button>
          ))}
          <span style={{marginLeft:'auto',fontSize:11,color:C.textMuted}}>{filtered.length} items</span>
        </div>

        {/* Header */}
        <div style={{
          display:'grid', gridTemplateColumns:'80px 1fr 110px 90px 1fr 80px',
          padding:'9px 18px', borderBottom:`1px solid ${C.border}`, background:'#fafbfc',
          fontSize:10, fontWeight:700, color:C.textMuted, letterSpacing:'0.08em',

          <span>ID</span><span>ITEM NAME</span><span>CATEGORY</span><span>STOCK</span><span>AVAILABILITY</span><span></span>
        </div>

        {filtered.length===0 && (
          <div style={{padding:'28px 18px',textAlign:'center',color:C.textMuted,fontSize:13}}>

          </div>
        )}

        {filtered.map((item,idx)=>{
          const bal=Math.max(0,getBalance(transactions,item.id));
          const avail=item.qty-bal;
          const pct=item.qty>0?bal/item.qty:0;
          const itemCat=(catsMap||CATS)[item.category]||{label:item.category,color:'#666',bg:'#f0f0f0'};
          return (
            <div key={item.id}
              style={{
                display:'grid', gridTemplateColumns:'80px 1fr 110px 90px 1fr 80px',
                padding:'11px 18px', borderBottom:idx<filtered.length-1?`1px solid ${C.border}`:'none',
                alignItems:'center',
              }}
              onMouseEnter={e=>e.currentTarget.style.background='#fafbfc'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}
            >
              <span style={{fontSize:10, fontFamily:'JetBrains Mono', color:C.textMuted}}>{item.id}</span>
              <div>
                <div style={{fontSize:13, fontWeight:500, color:C.text}}>{item.name}</div>
                {item.notes&&<div style={{fontSize:10,color:C.textMuted,marginTop:1}}>{item.notes}</div>}
              </div>
              <span style={{
                display:'inline-flex', width:'fit-content', padding:'2px 8px', borderRadius:4,
                fontSize:10, fontWeight:600, background:itemCat.bg, color:itemCat.color,
                border:`1px solid ${itemCat.color}30`,
              }}>{itemCat.label}</span>
              <span style={{fontSize:13, fontFamily:'JetBrains Mono', fontWeight:600}}>
                <span style={{color:avail>0?C.green:C.red}}>{avail}</span>
                <span style={{color:C.textMuted}}>/{item.qty}</span>
              </span>
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <div style={{flex:1, height:5, background:C.border, borderRadius:3, overflow:'hidden'}}>
                  <div style={{
                    height:'100%', borderRadius:3,
                    width:`${pct*100}%`,
                    background: pct===0?C.green:pct<0.5?C.amber:C.red,
                  }}/>
                </div>
                <span style={{fontSize:10, color:C.textMuted, minWidth:44, textAlign:'right'}}>
                  {bal>0?`${bal} out`:'in stock'}
                </span>
              </div>
              {/* Actions */}
              <div style={{display:'flex', gap:4, justifyContent:'flex-end'}}>
                <button onClick={()=>setEdit(item)} title="Edit" style={{
                  width:28,height:28,borderRadius:6,border:`1px solid ${C.border}`,
                  background:'transparent',cursor:'pointer',color:C.textMuted,
                  display:'flex',alignItems:'center',justifyContent:'center',
                }}
                onMouseEnter={e=>{e.currentTarget.style.background=C.blueBg;e.currentTarget.style.color=C.blue;e.currentTarget.style.borderColor=C.blue+'40';}}
                onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color=C.textMuted;e.currentTarget.style.borderColor=C.border;}}
                >
                  <Ic n="edit" s={12}/>
                </button>
                <button onClick={()=>setDel(item)} title="Remove" style={{
                  width:28,height:28,borderRadius:6,border:`1px solid ${C.border}`,
                  background:'transparent',cursor:'pointer',color:C.textMuted,
                  display:'flex',alignItems:'center',justifyContent:'center',
                }}
                onMouseEnter={e=>{e.currentTarget.style.background=C.redBg;e.currentTarget.style.color=C.red;e.currentTarget.style.borderColor=C.redBorder;}}
                onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color=C.textMuted;e.currentTarget.style.borderColor=C.border;}}
                >
                  <Ic n="trash" s={12}/>
                </button>
              </div>
            </div>
          );
        })}
      </div>

      {showAdd && (
        <AddItemModal
          catsMap={catsMap} onSave={item=>{ onAddItem(item); setShowAdd(false); }}
          onClose={()=>setShowAdd(false)}
        />
      )}
      {editItem && (
        <AddItemModal
          existing={editItem}
          onSave={item=>{ onEditItem(item); setEdit(null); }}
          onClose={()=>setEdit(null)}
        />
      )}
      {delItem && (
        <DeleteModal
          item={delItem}
          onConfirm={()=>{ onRemoveItem(delItem.id); setDel(null); }}
          onClose={()=>setDel(null)}
        />
      )}
    </div>
  );
};

// ── MANAGER HISTORY ───────────────────────────────────────────────────────

    .sort((a,b)=>new Date(b.date)-new Date(a.date))

      const item=items.find(i=>i.id===tx.itemId);

      const ms=!search||item?.name.toLowerCase().includes(search.toLowerCase())
        ||tx.person.toLowerCase().includes(search.toLowerCase())
        ||tx.itemId.toLowerCase().includes(search.toLowerCase());
      return mt&&ms;
    });

  return (

const CategoryFormModal = ({existing, existingIds, onSave, onClose}) => {
  const [label, setLabel] = useState(existing?.label || '');
  const [id, setId] = useState(existing?.id || '');
  const [color, setColor] = useState(existing?.color || '#2563bb');
  const isEdit = !!existing;

  // Auto-generate ID from label if new
  useEffect(() => {
    if (!isEdit && label) {
      const generated = label.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,20);
      setId(generated);
    }
  }, [label, isEdit]);

  // Auto-derive a soft background from the color
  const hexToBg = (hex) => {
    const h = hex.replace('#','');
    if (h.length !== 6) return '#f5f5f5';
    const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
    const mix = (c) => Math.round(c + (255 - c) * 0.88);
    const toHex = (n) => n.toString(16).padStart(2,'0');
    return '#' + toHex(mix(r)) + toHex(mix(g)) + toHex(mix(b));
  };
  const bg = hexToBg(color);

  const valid = label.trim() && id.trim() && (!isEdit ? !existingIds.includes(id) : true);
  const idConflict = !isEdit && id && existingIds.includes(id);

  const submit = () => {
    if (!valid) return;
    onSave({id: id.trim(), label: label.trim(), color, bg});
  };

  const inp = {width:'100%',background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:'9px 12px',color:C.text,fontSize:13};
  const lbl = {fontSize:11,fontWeight:600,color:C.textSub,letterSpacing:'0.04em',display:'block',marginBottom:6,textTransform:'uppercase'};
  const presets = ['#2563bb','#b5651d','#2e8b57','#7c3aed','#0e7490','#d94f3d','#c97a0a','#db2777'];

  return (
    <Modal onClose={onClose} width={440}>
      <h2 style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:20}}>
        {existing ? 'Edit Category' : 'Add Category'}
      </h2>
      <div style={{marginBottom:16}}>
        <label style={lbl}>Label</label>
        <input value={label} onChange={e=>setLabel(e.target.value)} placeholder="e.g. Drones" style={inp} autoFocus/>
      </div>
      <div style={{marginBottom:16}}>
        <label style={lbl}>ID <span style={{textTransform:'none',fontWeight:400,color:C.textMuted}}>(used internally, no spaces)</span></label>
        <input value={id} onChange={e=>setId(e.target.value.toLowerCase().replace(/[^a-z0-9]/g,''))} disabled={isEdit} placeholder="e.g. drones" style={{...inp, fontFamily:'JetBrains Mono', fontSize:12, opacity:isEdit?0.6:1}}/>
        {idConflict && <div style={{marginTop:4, fontSize:11, color:C.red}}>That ID already exists.</div>}
      </div>
      <div style={{marginBottom:22}}>
        <label style={lbl}>Color</label>
        <div style={{display:'flex', gap:6, flexWrap:'wrap', marginBottom:8}}>
          {presets.map(p=>(
            <button key={p} onClick={()=>setColor(p)} style={{
              width:30, height:30, borderRadius:6, cursor:'pointer',
              background:p, border: color===p ? `3px solid ${C.text}` : `1px solid ${C.border}`,
            }}/>
          ))}
        </div>
        <input type="color" value={color} onChange={e=>setColor(e.target.value)} style={{width:60, height:34, border:`1px solid ${C.border}`, borderRadius:6, cursor:'pointer', background:'none', padding:2}}/>
        <span style={{marginLeft:10, fontSize:12, fontFamily:'JetBrains Mono', color:C.textSub}}>{color}</span>
        <div style={{marginTop:12, padding:'8px 12px', background:bg, borderRadius:6, display:'inline-block'}}>
          <span style={{color, fontWeight:700, fontSize:12}}>{label||'Preview'}</span>
        </div>
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button onClick={onClose} style={{padding:'9px 16px',borderRadius:7,border:`1px solid ${C.border}`,background:C.surface,color:C.textSub,fontSize:12,fontWeight:600,cursor:'pointer'}}>Cancel</button>
        <button onClick={submit} disabled={!valid} style={{
          padding:'9px 16px',borderRadius:7,border:'none',
          background:valid?'var(--accent)':C.border, color:valid?'#fff':C.textMuted,
          fontSize:12, fontWeight:700, cursor:valid?'pointer':'not-allowed',
        }}>{existing?'Save':'Add Category'}</button>
      </div>
    </Modal>
  );
};

// ── APP ROOT ──────────────────────────────────────────────────────────────
const App = () => {
  const [role, setRole]       = useState(()=>localStorage.getItem('inv_role')||'crew');
  const [mgrView, setMgrView] = useState(()=>localStorage.getItem('inv_mgv')||'dashboard');
  const [items, setItems]     = useState([]);
  const [transactions, setTx] = useState([]);
  const [people, setPeople]   = useState([]);
  const [syncStatus, setSyncStatus] = useState('connecting');

  // Firebase: subscribe to items collection
  useEffect(() => {
    const db = window.__db;
    const unsub = db.collection('items').onSnapshot(
      snap => {
        const list = snap.docs.map(d => d.data());
        if (list.length === 0) {
          const batch = db.batch();
          ITEMS.forEach(it => batch.set(db.collection('items').doc(it.id), it));
          batch.commit().catch(e => console.error('Seed failed', e));
        } else {
          setItems(list);
        }
        setSyncStatus('synced');
      },
      err => { console.error('Items sync error', err); setSyncStatus('error'); }
    );
    return unsub;
  }, []);

  // Firebase: subscribe to transactions collection (newest first)
  useEffect(() => {
    const db = window.__db;
    const unsub = db.collection('transactions').orderBy('date', 'desc').onSnapshot(
      snap => setTx(snap.docs.map(d => d.data())),
      err => console.error('Tx sync error', err)
    );
    return unsub;
  }, []);

  // Firebase: subscribe to people collection
  useEffect(() => {
    const db = window.__db;
    const unsub = db.collection('people').onSnapshot(
      snap => setPeople(snap.docs.map(d => d.data())),
      err => console.error('People sync error', err)
    );
    return unsub;
  }, []);

  // Firebase: subscribe to categories collection
  const [customCats, setCustomCats] = useState({});
  useEffect(() => {
    const db = window.__db;
    const unsub = db.collection('categories').onSnapshot(
      snap => {
        const list = snap.docs.map(d => d.data());
        if (list.length === 0) {
          // Seed with defaults on first run
          const batch = db.batch();
          Object.entries(CATS).forEach(([id, c]) => {
            batch.set(db.collection('categories').doc(id), {id, label: c.label, color: c.color, bg: c.bg});
          });
          batch.commit().catch(e => console.error('Category seed failed', e));
        } else {
          const map = {};
          list.forEach(c => { map[c.id] = {label: c.label, color: c.color, bg: c.bg}; });
          setCustomCats(map);
        }
      },
      err => console.error('Categories sync error', err)
    );
    return unsub;
  }, []);

  // Merged categories — Firestore overrides defaults
  const catsMap = Object.keys(customCats).length > 0 ? customCats : CATS;

  const addItem    = (item) => { window.__db.collection('items').doc(item.id).set(item); };
  const editItem   = (item) => { window.__db.collection('items').doc(item.id).set(item); };
  const removeItem = (id)   => { window.__db.collection('items').doc(id).delete(); };
  const addPerson    = (p) => { window.__db.collection('people').doc(p.id).set(p); };
  const editPerson   = (p) => { window.__db.collection('people').doc(p.id).set(p); };
  const removePerson = (id)=> { window.__db.collection('people').doc(id).delete(); };
  const addCategory    = (c) => { window.__db.collection('categories').doc(c.id).set(c); };
  const editCategory   = (c) => { window.__db.collection('categories').doc(c.id).set(c); };
  const removeCategory = (id)=> { window.__db.collection('categories').doc(id).delete(); };
  const [modal, setModal]     = useState(null);
  const [showPin, setShowPin] = useState(false);
  const [tweaks, setTweaks]   = useState(()=>{
    try{return JSON.parse(localStorage.getItem('inv_tw'))||TWEAK_DEFAULTS;}catch{return TWEAK_DEFAULTS;}
  });
  const [tweaksVis, setTV]    = useState(false);

  useEffect(()=>localStorage.setItem('inv_role',role),[role]);
  useEffect(()=>localStorage.setItem('inv_mgv',mgrView),[mgrView]);
  useEffect(()=>localStorage.setItem('inv_tw',JSON.stringify(tweaks)),[tweaks]);
  useEffect(()=>window.parent.postMessage({type:'__edit_mode_set_keys',edits:tweaks},'*'),[tweaks]);

  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode')  setTV(true);
      if(e.data?.type==='__deactivate_edit_mode')setTV(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const switchRole = (r) => {
    if(r==='manager' && role!=='manager') { setShowPin(true); }
    else { setRole(r); }
  };

  const confirm = ({itemId,person,email,qty,notes,type}) => {
    const id = 'tx' + Date.now() + '-' + Math.random().toString(36).slice(2,7);
    const doc = {id,itemId,person,email:email||'',qty,notes,type,date:new Date().toISOString()};
    window.__db.collection('transactions').doc(id).set(doc);
    // Auto-save new person if not already in people list
    if (person && email) {
      const nameLower = person.trim().toLowerCase();
      const exists = people.find(p => p.name.trim().toLowerCase() === nameLower);
      if (!exists) {
        const pid = 'p-' + nameLower.replace(/[^a-z0-9]/g,'-').slice(0,40) + '-' + Date.now().toString(36).slice(-4);
        window.__db.collection('people').doc(pid).set({
          id: pid, name: person.trim(), email: email.trim(),
          createdAt: new Date().toISOString()
        });
      }
    }
    // Send confirmation email on check-OUT (only if email was provided)
    console.log('[Email] Checking conditions: type=', type, 'email=', email, 'emailjs?', !!window.__emailjs);
    if (type === 'out' && email && email.trim()) {
      if (!window.__emailjs) {
        console.error('[Email] EmailJS SDK not loaded — window.__emailjs is undefined');
      } else {
        const item = items.find(i => i.id === itemId);
        const params = {
          to_email: email.trim(),
          person_name: person.trim(),
          item_name: item ? item.name : itemId,
          item_id: itemId,
          qty: String(qty),
          category: item && CATS[item.category] ? CATS[item.category].label : '',
          item_notes: (item && item.notes) || 'None',
          user_notes: notes || 'None',
          date: new Date().toLocaleString('en-US', {dateStyle:'medium', timeStyle:'short'}),
        };
        console.log('[Email] Sending with params:', params);
        window.__emailjs.send('service_ubh3sfh', 'template_x5tz2ra', params)
          .then(r => console.log('[Email] ✓ Sent to', email, '— response:', r))
          .catch(err => console.error('[Email] ✗ Failed:', err, JSON.stringify(err)));
      }
    } else {
      console.log('[Email] Skipped — type:', type, 'email empty?', !email || !email.trim());
    }
    setTimeout(()=>setModal(null),600);
  };

  const openModal = (type, prefill='') => setModal({type, prefill});

  // Derived accent light color for CSS variable
  const accentLight = tweaks.accentColorHex + '20';

  return (
    <div style={{
      '--accent': tweaks.accentColor,
      '--accent-light': accentLight,
      height:'100vh', display:'flex', flexDirection:'column', overflow:'hidden',
    }}>
      <style>{`
        select option { background: #fff; color: #1a1f2e; }
        button { font-family: Inter, system-ui, sans-serif; }

        /* Mobile responsive overrides */
        @media (max-width: 700px) {
          /* Collapse any sidebar (width:260 or 210 px flexShrink:0) into a horizontal top strip */
          div[style*="width: 260px"][style*="flex-shrink: 0"],
          div[style*="width: 210px"][style*="flex-shrink: 0"] {
            width: 100% !important;
            height: auto !important;
            flex-shrink: 0 !important;
            flex-direction: row !important;
            overflow-x: auto !important;
            border-right: none !important;
          }

          /* App root container becomes column */
          div[style*="height: 100%"][style*="display: flex"] {
            flex-direction: column !important;
          }

          /* Logo area compact on mobile */
          div[style*="padding: 22px 20px 18px"] {
            padding: 12px 14px !important;
            border-bottom: none !important;
            border-right: 1px solid rgba(255,255,255,0.08) !important;
            min-width: 200px;
            flex-shrink: 0;
          }

          /* Dashboard grid tiles -> single column */
          div[style*="grid-template-columns"] {
            grid-template-columns: 1fr !important;
          }

          /* Tables: allow horizontal scroll */
          div[style*="overflow: auto"], div[style*="overflow: hidden"] {
            overflow-x: auto !important;
          }

          /* Top bar: wrap and smaller */
          div[style*="height: 42px"][style*="padding: 0px 20px"] {
            padding: 0 12px !important;
            flex-wrap: wrap !important;
            height: auto !important;
            min-height: 42px;
            gap: 6px !important;
          }

          /* Modal: full width */
          div[style*="max-width: 520px"],
          div[style*="max-width: 480px"],
          div[style*="max-width: 440px"] {
            max-width: 95vw !important;
          }

          /* Main padded content areas: reduce */
          div[style*="padding: 32px"] {
            padding: 16px !important;
          }
          div[style*="padding: 28px"] {
            padding: 14px !important;
          }
          div[style*="padding: 24px"] {
            padding: 12px !important;
          }

          /* Buttons with cramped text stay readable */
          button[style*="padding: 5px 13px"] {
            padding: 6px 10px !important;
            font-size: 11px !important;
          }
        }

        /* Prevent body zoom on input focus on iOS */
        @media (max-width: 700px) {
          input, select, textarea {
            font-size: 16px !important;
          }
        }
      `}</style>

      {/* Top bar */}
      <div style={{
        background:C.topbar, borderBottom:`1px solid rgba(255,255,255,0.08)`,
        display:'flex', alignItems:'center', padding:'0 20px', height:42, flexShrink:0, gap:12,
      }}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginRight:'auto'}}>
          <Ic n="film" s={14} c="rgba(255,255,255,0.5)"/>
          <span style={{fontSize:12,color:'rgba(255,255,255,0.35)',letterSpacing:'0.06em'}}>
            {new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
          </span>
        </div>

        <span style={{fontSize:11, color:'rgba(255,255,255,0.4)', letterSpacing:'0.06em'}}>VIEW MODE</span>
        {[['crew','Crew Mode'],['manager','Manager']].map(([v,l])=>(
          <button key={v} onClick={()=>switchRole(v)} style={{
            display:'flex', alignItems:'center', gap:5, padding:'5px 13px', borderRadius:5, border:'none',
            background: role===v ? 'var(--accent)' : 'rgba(255,255,255,0.08)',
            color: role===v ? '#fff' : 'rgba(255,255,255,0.5)',
            fontSize:11, fontWeight:role===v?700:500, cursor:'pointer',
          }}>{l}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{flex:1, overflow:'hidden'}}>
        {role==='crew' ? (
          <CrewView items={items} transactions={transactions} openModal={openModal} catsMap={catsMap}/>
        ) : (
          <MgrLayout view={mgrView} setView={setMgrView} openModal={openModal}>
            {mgrView==='dashboard'  && <MgrDashboard  items={items} transactions={transactions} openModal={openModal}/>}
            {mgrView==='catalog'    && <MgrCatalog    items={items} transactions={transactions} catsMap={catsMap} openModal={openModal} onAddItem={addItem} onEditItem={editItem} onRemoveItem={removeItem}/>}
            {mgrView==='history'    && <MgrHistory    items={items} transactions={transactions}/>}
            {mgrView==='people'     && <MgrPeople     people={people} transactions={transactions} onAddPerson={addPerson} onEditPerson={editPerson} onRemovePerson={removePerson}/>}
            {mgrView==='categories' && <MgrCategories catsMap={catsMap} items={items} onAddCategory={addCategory} onEditCategory={editCategory} onRemoveCategory={removeCategory}/>}
          </MgrLayout>
        )}
      </div>

      {modal && (
        <CheckModal type={modal.type} items={items} transactions={transactions} people={people} catsMap={catsMap}
          onConfirm={confirm} onClose={()=>setModal(null)} prefill={modal.prefill}/>
      )}

      {showPin && (
        <PinModal
          correctPin={tweaks.managerPin||'1234'}
          onSuccess={()=>{ setShowPin(false); setRole('manager'); }}
          onCancel={()=>setShowPin(false)}
        />
      )}

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVis}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>


</body></html>
